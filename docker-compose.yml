services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: test_bank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/test_bank
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@db:5432/test_bank
      JWT_SECRET_KEY: super-secret-jwt-key-change-me-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      PAYMENT_SECRET_KEY: gfdmhghif38yrf9ew0jkf32
      COOKIE_NAME: access_token
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
